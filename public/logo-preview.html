<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Body Bank Fitness — Logo Preview v2 (Safe Dial)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0EB; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 80px 40px; gap: 80px; font-family: 'Inter', sans-serif; }
    h2 { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(44,36,23,0.35); text-align: center; }
    .section { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .row { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; justify-content: center; }
    .swatch { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .swatch span { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(44,36,23,0.38); }
    .on-cream  { background: #F5F0EB; padding: 40px 56px; }
    .on-dark   { background: #2C2417; padding: 40px 56px; }
    .on-white  { background: #FDFAF7; padding: 40px 56px; border: 1px solid rgba(44,36,23,0.08); }
    hr { width: 100%; max-width: 680px; border: none; border-top: 1px solid rgba(44,36,23,0.10); }
  </style>
</head>
<body>

  <!-- ── WORDMARK LOGO ─────────────────────────────────────────── -->
  <div class="section">
    <h2>Wordmark — Cream Background (Navbar)</h2>
    <div class="on-cream">
      <svg id="logo-cream" width="340" height="112" viewBox="0 0 220 72" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="section">
    <h2>Wordmark — Dark Background (Footer)</h2>
    <div class="on-dark">
      <svg id="logo-dark" width="340" height="112" viewBox="0 0 220 72" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <hr>

  <!-- ── ICON ONLY ──────────────────────────────────────────────── -->
  <div class="section">
    <h2>Icon Only — Safe Dial Mark</h2>
    <div class="row">
      <div class="swatch">
        <div class="on-white">
          <svg id="icon-lg" width="160" height="160" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <span>On White</span>
      </div>
      <div class="swatch">
        <div class="on-dark">
          <svg id="icon-dark" width="160" height="160" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <span>On Dark</span>
      </div>
    </div>
  </div>

  <hr>

  <!-- ── INSTAGRAM PROFILE ──────────────────────────────────────── -->
  <div class="section">
    <h2>Instagram Profile Picture</h2>

    <div class="swatch">
      <div class="on-white" style="padding:24px;">
        <svg id="ig-full" width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <span>Full size 400 × 400</span>
    </div>

    <div class="section" style="margin-top:16px;">
      <h2>Rendered at actual Instagram sizes</h2>
      <div class="row" style="background:#FDFAF7; padding:40px 48px; border:1px solid rgba(44,36,23,0.08);">

        <div class="swatch">
          <svg id="ig-110" width="110" height="110" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%;display:block;"></svg>
          <span>110px · Mobile</span>
        </div>

        <div class="swatch">
          <svg id="ig-150" width="150" height="150" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%;display:block;"></svg>
          <span>150px · Desktop</span>
        </div>

        <div class="swatch">
          <div style="padding:3px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:50%;">
            <svg id="ig-56" width="56" height="56" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:50%;display:block;"></svg>
          </div>
          <span>56px · Story</span>
        </div>

      </div>
    </div>
  </div>

<script>
// ─── Helpers ────────────────────────────────────────────────────────────────

const ns = "http://www.w3.org/2000/svg";

function el(tag, attrs) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function textEl(content, attrs) {
  const e = el("text", attrs);
  e.textContent = content;
  return e;
}

// ─── Safe-Dial Tick Marks ────────────────────────────────────────────────────
// Generates tick marks around a circle on an SVG element.
// cx, cy   — center
// outerR   — outer radius of tick
// total    — total number of ticks
// majorEvery — every Nth tick is a major tick
// majorLen / minorLen — tick lengths (inward from outerR)
// color, majorW, minorW — stroke styling

function addTicks(svg, { cx, cy, outerR, total, majorEvery, majorLen, minorLen, color, majorW, minorW }) {
  for (let i = 0; i < total; i++) {
    const angleDeg = (i * 360 / total) - 90; // 0 = top
    const rad = angleDeg * Math.PI / 180;
    const isMajor = (i % majorEvery === 0);
    const len = isMajor ? majorLen : minorLen;
    const innerR = outerR - len;
    svg.appendChild(el("line", {
      x1: (cx + outerR * Math.cos(rad)).toFixed(3),
      y1: (cy + outerR * Math.sin(rad)).toFixed(3),
      x2: (cx + innerR * Math.cos(rad)).toFixed(3),
      y2: (cy + innerR * Math.sin(rad)).toFixed(3),
      stroke: color,
      "stroke-width": (isMajor ? majorW : minorW).toString(),
      "stroke-linecap": "round",
    }));
  }
}

// ─── Pointer triangle (safe-dial index mark at top) ─────────────────────────
// Points inward from the outermost edge at the 12-o'clock position.
function addPointer(svg, { cx, cy, outerR, size, color }) {
  const tipY = cy - outerR + size + 1;
  svg.appendChild(el("polygon", {
    points: `${cx},${cy - outerR + 1} ${cx - size * 0.55},${tipY + size} ${cx + size * 0.55},${tipY + size}`,
    fill: color,
  }));
}

// ─── Build the icon mark (safe-dial) ────────────────────────────────────────
// Works for any viewBox; all sizes expressed relative to cx/cy and r.
function buildDialIcon(svg, { cx, cy, primary, cognac, cognacFaint, large }) {
  const R = large ? 32 : 32; // outer bezel radius

  // Outer bezel ring
  svg.appendChild(el("circle", { cx, cy, r: R,        stroke: cognac, "stroke-width": large ? "1.2" : "1",   fill: "none" }));
  // Inner dial face ring
  svg.appendChild(el("circle", { cx, cy, r: R * 0.70, stroke: cognacFaint, "stroke-width": large ? "0.6" : "0.5", fill: "none" }));
  // Center hub ring
  svg.appendChild(el("circle", { cx, cy, r: R * 0.22, stroke: cognac, "stroke-width": large ? "0.7" : "0.6", fill: "none", opacity: "0.6" }));

  // Tick marks — 60 total (every 6°), major every 5 (at every 30°, = 12 marks)
  addTicks(svg, {
    cx, cy,
    outerR: R * 0.93,
    total: 60,
    majorEvery: 5,
    majorLen: R * 0.13,
    minorLen: R * 0.07,
    color: cognac,
    majorW: large ? 1.0 : 0.85,
    minorW: large ? 0.5 : 0.4,
  });

  // Index pointer at top
  addPointer(svg, { cx, cy, outerR: R, size: large ? 2.8 : 2.4, color: cognac });

  // BB monogram
  const bbSize = large ? 26 : 22;
  svg.appendChild(textEl("BB", {
    x: cx, y: cy + bbSize * 0.35,
    "text-anchor": "middle",
    "font-family": "'Cormorant Garamond', serif",
    "font-weight": "600",
    "font-size": bbSize,
    "letter-spacing": "0.04em",
    fill: primary,
  }));
}

// ─── Build horizontal wordmark ───────────────────────────────────────────────
function buildWordmark(svgId, { primary, cognac, cognacFaint }) {
  const svg = document.getElementById(svgId);
  // viewBox 0 0 220 72, dial centered at 36 36

  buildDialIcon(svg, { cx: 36, cy: 36, primary, cognac, cognacFaint, large: false });

  // BODY BANK
  svg.appendChild(textEl("BODY BANK", {
    x: 80, y: 30,
    "font-family": "'Cormorant Garamond', serif",
    "font-weight": "600",
    "font-size": "20",
    "letter-spacing": "0.20em",
    fill: primary,
  }));

  // Thin divider
  svg.appendChild(el("line", { x1: 80, y1: 37, x2: 216, y2: 37, stroke: cognac, "stroke-width": "0.65", opacity: "0.4" }));

  // FITNESS
  svg.appendChild(textEl("FITNESS", {
    x: 80, y: 50,
    "font-family": "'Inter', sans-serif",
    "font-weight": "300",
    "font-size": "9.5",
    "letter-spacing": "0.50em",
    fill: cognac,
  }));

  // Tagline — right-aligned, tiny
  svg.appendChild(textEl("INVEST IN YOURSELF", {
    x: 216, y: 62,
    "text-anchor": "end",
    "font-family": "'Inter', sans-serif",
    "font-weight": "300",
    "font-size": "6.5",
    "letter-spacing": "0.14em",
    fill: cognac,
    opacity: "0.50",
  }));
}

// ─── Build standalone icon ───────────────────────────────────────────────────
function buildIcon(svgId, { primary, cognac, cognacFaint }) {
  const svg = document.getElementById(svgId);
  buildDialIcon(svg, { cx: 36, cy: 36, primary, cognac, cognacFaint, large: true });
}

// ─── Build Instagram mark (400×400 viewBox) ──────────────────────────────────
function buildIG(svgId) {
  const svg = document.getElementById(svgId);
  const cx = 200, cy = 200;
  const espresso = "#2C2417";
  const cream = "#F5F0EB";
  const cognac = "#8B6F4E";
  const cognacFaint = "rgba(245,240,235,0.18)";

  // Background fill
  svg.appendChild(el("circle", { cx, cy, r: 200, fill: espresso }));

  // Safe dial — large version scaled to 400×400
  const R = 162; // outer bezel

  // Outer bezel ring
  svg.appendChild(el("circle", { cx, cy, r: R, stroke: cognac, "stroke-width": "2", fill: "none" }));
  // Inner dial face ring
  svg.appendChild(el("circle", { cx, cy, r: R * 0.70, stroke: cognacFaint, "stroke-width": "1.2", fill: "none" }));
  // Subtle second inner ring
  svg.appendChild(el("circle", { cx, cy, r: R * 0.50, stroke: cognacFaint, "stroke-width": "0.8", fill: "none" }));
  // Center hub
  svg.appendChild(el("circle", { cx, cy, r: R * 0.10, stroke: cognac, "stroke-width": "1", fill: "none", opacity: "0.5" }));

  // Tick marks — 60 total
  addTicks(svg, {
    cx, cy,
    outerR: R * 0.935,
    total: 60,
    majorEvery: 5,
    majorLen: R * 0.11,
    minorLen: R * 0.055,
    color: cognac,
    majorW: 2.5,
    minorW: 1.1,
  });

  // Index pointer at top
  addPointer(svg, { cx, cy, outerR: R, size: 11, color: cognac });

  // BB monogram — large, cream
  svg.appendChild(textEl("BB", {
    x: cx, y: cy - 10,
    "text-anchor": "middle",
    "font-family": "'Cormorant Garamond', serif",
    "font-weight": "600",
    "font-size": "118",
    "letter-spacing": "-3",
    fill: cream,
  }));

  // Thin divider under BB
  svg.appendChild(el("line", { x1: cx - 105, y1: cy + 38, x2: cx + 105, y2: cy + 38, stroke: cognac, "stroke-width": "1", opacity: "0.45" }));

  // BODY BANK
  svg.appendChild(textEl("BODY BANK", {
    x: cx, y: cy + 80,
    "text-anchor": "middle",
    "font-family": "'Cormorant Garamond', serif",
    "font-weight": "400",
    "font-size": "28",
    "letter-spacing": "13",
    fill: cream,
  }));

  // FITNESS
  svg.appendChild(textEl("FITNESS", {
    x: cx, y: cy + 112,
    "text-anchor": "middle",
    "font-family": "'Inter', sans-serif",
    "font-weight": "300",
    "font-size": "13",
    "letter-spacing": "8",
    fill: cognac,
  }));

  // Tagline
  svg.appendChild(textEl("INVEST IN YOURSELF", {
    x: cx, y: cy + 140,
    "text-anchor": "middle",
    "font-family": "'Inter', sans-serif",
    "font-weight": "300",
    "font-size": "9.5",
    "letter-spacing": "5",
    fill: cognac,
    opacity: "0.50",
  }));
}

// ─── Render all logos ────────────────────────────────────────────────────────

const dark     = "#2C2417";
const cream    = "#F5F0EB";
const cognac   = "#8B6F4E";
const cognacFaintDark  = "rgba(139,111,78,0.22)";
const cognacFaintLight = "rgba(139,111,78,0.22)";

// Wordmarks
buildWordmark("logo-cream", { primary: dark,  cognac, cognacFaint: cognacFaintDark  });
buildWordmark("logo-dark",  { primary: cream, cognac, cognacFaint: "rgba(245,240,235,0.18)" });

// Standalone icons
buildIcon("icon-lg",   { primary: dark,  cognac, cognacFaint: cognacFaintLight });
buildIcon("icon-dark", { primary: cream, cognac, cognacFaint: "rgba(245,240,235,0.18)" });

// Instagram (all share same content)
["ig-full", "ig-110", "ig-150", "ig-56"].forEach(id => buildIG(id));
</script>

</body>
</html>
